<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lúa Farm Camera Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #1f2937;
        }

        .stat-card.success .stat-value {
            color: #10b981;
        }

        .stat-card.warning .stat-value {
            color: #f59e0b;
        }

        .stat-card.danger .stat-value {
            color: #ef4444;
        }

        .cameras-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .camera-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .camera-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f3f4f6;
        }

        .camera-name {
            font-size: 20px;
            font-weight: bold;
            color: #1f2937;
        }

        .health-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .health-badge.healthy {
            background: #d1fae5;
            color: #065f46;
        }

        .health-badge.warning {
            background: #fef3c7;
            color: #92400e;
        }

        .health-badge.critical {
            background: #fee2e2;
            color: #991b1b;
        }

        .camera-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .camera-stat {
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
        }

        .camera-stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 5px;
        }

        .camera-stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #1f2937;
        }

        .timestamp {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 5px;
        }

        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }

        .chart-container h2 {
            color: #1f2937;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .charts-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .charts-wrapper {
                grid-template-columns: 1fr;
            }
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 18px;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .success-rate-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .success-rate-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <div class="status-indicator"></div>
                Smart Farm Camera Dashboard
            </h1>
            <button class="refresh-btn" onclick="loadData()">🔄 Làm mới dữ liệu</button>
        </div>

        <div id="loading" class="loading">Đang tải dữ liệu...</div>
        <div id="error" style="display: none;"></div>

        <div id="statsGrid" class="stats-grid" style="display: none;"></div>
        <div id="camerasGrid" class="cameras-grid" style="display: none;"></div>
        
        <div class="charts-wrapper" id="chartsWrapper" style="display: none;">
            <div class="chart-container">
                <h2>📊 Biểu đồ cột - Kết nối Camera</h2>
                <canvas id="cameraChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>🥧 Biểu đồ tròn - Phân bố lỗi</h2>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <div class="charts-wrapper" id="chartsWrapper2" style="display: none;">
            <div class="chart-container">
                <h2>📈 Biểu đồ đường - Tỷ lệ thành công</h2>
                <canvas id="lineChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>📊 Biểu đồ ngang - So sánh Camera</h2>
                <canvas id="horizontalChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let chartInstances = {
            bar: null,
            pie: null,
            line: null,
            horizontal: null
        };
        const API_URL = 'https://api-lua.s4h.edu.vn/stats';
        const API_SUMMARY_URL = 'https://api-lua.s4h.edu.vn/summary';
        
        // Sử dụng proxy ổn định nhất
        const USE_PROXY = true;
        const BEST_PROXY = 'https://api.codetabs.com/v1/proxy?quest='; // Proxy hoạt động tốt nhất
        
        let currentProxyIndex = 0;

        function formatTimestamp(timestamp) {
            if (!timestamp) return 'Chưa có dữ liệu';
            // API trả về định dạng: "2026-01-23 22:22:40"
            const dateStr = timestamp.replace(' ', 'T');
            const date = new Date(dateStr);
            return date.toLocaleString('vi-VN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function calculateSuccessRate(total, failed) {
            if (total === 0) return 0;
            return ((total - failed) / total * 100).toFixed(1);
        }

        function getHealthStatus(successRate) {
            if (successRate >= 95) return { class: 'healthy', text: 'Tốt' };
            if (successRate >= 85) return { class: 'warning', text: 'Cảnh báo' };
            return { class: 'critical', text: 'Nguy hiểm' };
        }

        function renderStats(data, summary) {
            const cameras = Object.entries(data);
            const totalCameras = summary ? summary.total_cameras : cameras.length;
            const onlineCameras = summary ? summary.online_cameras : cameras.filter(([_, stats]) => {
                const rate = calculateSuccessRate(stats.total_attempts, stats.failed_attempts);
                return rate >= 95;
            }).length;
            const offlineCameras = summary ? summary.offline_cameras : totalCameras - onlineCameras;
            const totalFailed = summary ? summary.total_system_failures : cameras.reduce((sum, [_, stats]) => sum + stats.failed_attempts, 0);
            const systemStatus = summary ? summary.status : (onlineCameras === totalCameras ? 'Healthy' : 'Warning');

            const statsHTML = `
                <div class="stat-card ${systemStatus === 'Healthy' ? 'success' : 'warning'}">
                    <h3>🏥 Trạng thái hệ thống</h3>
                    <div class="stat-value" style="font-size: 24px;">${systemStatus === 'Healthy' ? '✅ Khỏe mạnh' : '⚠️ Cảnh báo'}</div>
                </div>
                <div class="stat-card success">
                    <h3>📹 Tổng số Camera</h3>
                    <div class="stat-value">${totalCameras}</div>
                </div>
                <div class="stat-card success">
                    <h3>✅ Camera Online</h3>
                    <div class="stat-value">${onlineCameras}</div>
                </div>
                <div class="stat-card ${offlineCameras > 0 ? 'danger' : 'success'}">
                    <h3>❌ Camera Offline</h3>
                    <div class="stat-value">${offlineCameras}</div>
                </div>
                <div class="stat-card ${totalFailed > 10 ? 'warning' : 'success'}">
                    <h3>⚠️ Tổng lỗi hệ thống</h3>
                    <div class="stat-value">${totalFailed}</div>
                </div>
            `;

            document.getElementById('statsGrid').innerHTML = statsHTML;
            document.getElementById('statsGrid').style.display = 'grid';
        }

        function renderCameras(data) {
            const camerasHTML = Object.entries(data).map(([cameraId, stats]) => {
                const successRate = calculateSuccessRate(stats.total_attempts, stats.failed_attempts);
                const health = getHealthStatus(successRate);

                return `
                    <div class="camera-card">
                        <div class="camera-header">
                            <div class="camera-name">📷 ${cameraId}</div>
                            <div class="health-badge ${health.class}">${health.text}</div>
                        </div>
                        <div class="camera-stats">
                            <div class="camera-stat">
                                <div class="camera-stat-label">Tổng kết nối</div>
                                <div class="camera-stat-value">${stats.total_attempts}</div>
                            </div>
                            <div class="camera-stat">
                                <div class="camera-stat-label">Thất bại</div>
                                <div class="camera-stat-value" style="color: #ef4444;">${stats.failed_attempts}</div>
                            </div>
                            <div class="camera-stat">
                                <div class="camera-stat-label">Thành công gần nhất</div>
                                <div class="timestamp">${formatTimestamp(stats.last_success)}</div>
                            </div>
                            <div class="camera-stat">
                                <div class="camera-stat-label">Thất bại gần nhất</div>
                                <div class="timestamp">${formatTimestamp(stats.last_failure)}</div>
                            </div>
                        </div>
                        <div>
                            <div class="camera-stat-label">Tỷ lệ thành công: ${successRate}%</div>
                            <div class="success-rate-bar">
                                <div class="success-rate-fill" style="width: ${successRate}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('camerasGrid').innerHTML = camerasHTML;
            document.getElementById('camerasGrid').style.display = 'grid';
        }

        function renderChart(data) {
            const labels = Object.keys(data);
            const successData = Object.values(data).map(stats => stats.total_attempts - stats.failed_attempts);
            const failureData = Object.values(data).map(stats => stats.failed_attempts);
            const totalAttempts = Object.values(data).map(stats => stats.total_attempts);
            const successRates = Object.values(data).map(stats => 
                calculateSuccessRate(stats.total_attempts, stats.failed_attempts)
            );

            // Gradient colors
            const successGradient = ['#10b981', '#34d399', '#6ee7b7', '#a7f3d0'];
            const failureGradient = ['#ef4444', '#f87171', '#fca5a5', '#fecaca'];

            // 1. Biểu đồ cột (Bar Chart)
            const ctxBar = document.getElementById('cameraChart').getContext('2d');
            if (chartInstances.bar) chartInstances.bar.destroy();
            
            chartInstances.bar = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '✅ Kết nối thành công',
                            data: successData,
                            backgroundColor: 'rgba(16, 185, 129, 0.85)',
                            borderColor: 'rgba(16, 185, 129, 1)',
                            borderWidth: 2,
                            borderRadius: 8,
                            borderSkipped: false,
                        },
                        {
                            label: '❌ Kết nối thất bại',
                            data: failureData,
                            backgroundColor: 'rgba(239, 68, 68, 0.85)',
                            borderColor: 'rgba(239, 68, 68, 1)',
                            borderWidth: 2,
                            borderRadius: 8,
                            borderSkipped: false,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                font: { size: 13, weight: 'bold' },
                                padding: 15,
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.85)',
                            padding: 12,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            borderColor: 'rgba(255, 255, 255, 0.2)',
                            borderWidth: 1,
                            displayColors: true,
                            callbacks: {
                                footer: (items) => {
                                    const index = items[0].dataIndex;
                                    const total = totalAttempts[index];
                                    return `Tổng: ${total} lần kết nối`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)',
                                drawBorder: false
                            },
                            ticks: {
                                stepSize: 1,
                                font: { size: 11 }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45,
                                font: { size: 10 }
                            }
                        }
                    }
                }
            });

            // 2. Biểu đồ tròn (Pie Chart) - Phân bố lỗi
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            if (chartInstances.pie) chartInstances.pie.destroy();

            const totalSuccess = successData.reduce((a, b) => a + b, 0);
            const totalFailure = failureData.reduce((a, b) => a + b, 0);
            
            chartInstances.pie = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['✅ Thành công', '❌ Thất bại'],
                    datasets: [{
                        data: [totalSuccess, totalFailure],
                        backgroundColor: [
                            'rgba(16, 185, 129, 0.85)',
                            'rgba(239, 68, 68, 0.85)',
                        ],
                        borderColor: ['#10b981', '#ef4444'],
                        borderWidth: 3,
                        hoverOffset: 15
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                font: { size: 13, weight: 'bold' },
                                padding: 20,
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.85)',
                            padding: 12,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            callbacks: {
                                label: (context) => {
                                    const label = context.label || '';
                                    const value = context.parsed;
                                    const total = totalSuccess + totalFailure;
                                    const percent = ((value / total) * 100).toFixed(1);
                                    return `${label}: ${value} (${percent}%)`;
                                }
                            }
                        }
                    }
                }
            });

            // 3. Biểu đồ đường (Line Chart) - Tỷ lệ thành công
            const ctxLine = document.getElementById('lineChart').getContext('2d');
            if (chartInstances.line) chartInstances.line.destroy();
            
            chartInstances.line = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '📈 Tỷ lệ thành công (%)',
                        data: successRates,
                        borderColor: 'rgba(99, 102, 241, 1)',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointHoverRadius: 8,
                        pointBackgroundColor: 'rgba(99, 102, 241, 1)',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgba(99, 102, 241, 1)',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                font: { size: 13, weight: 'bold' },
                                padding: 15,
                                usePointStyle: true
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.85)',
                            padding: 12,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            callbacks: {
                                label: (context) => {
                                    return `Tỷ lệ: ${context.parsed.y}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)',
                                drawBorder: false
                            },
                            ticks: {
                                callback: (value) => value + '%',
                                font: { size: 11 }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45,
                                font: { size: 10 }
                            }
                        }
                    }
                }
            });

            // 4. Biểu đồ ngang (Horizontal Bar) - So sánh
            const ctxHorizontal = document.getElementById('horizontalChart').getContext('2d');
            if (chartInstances.horizontal) chartInstances.horizontal.destroy();
            
            chartInstances.horizontal = new Chart(ctxHorizontal, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '📊 Tổng kết nối',
                        data: totalAttempts,
                        backgroundColor: labels.map((_, i) => {
                            const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#f43f5e', '#f59e0b', '#10b981', '#06b6d4', '#3b82f6', '#a855f7', '#14b8a6'];
                            return colors[i % colors.length];
                        }),
                        borderColor: labels.map((_, i) => {
                            const colors = ['#4f46e5', '#7c3aed', '#db2777', '#e11d48', '#d97706', '#059669', '#0891b2', '#2563eb', '#9333ea', '#0d9488'];
                            return colors[i % colors.length];
                        }),
                        borderWidth: 2,
                        borderRadius: 8,
                        borderSkipped: false,
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.85)',
                            padding: 12,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)',
                                drawBorder: false
                            },
                            ticks: {
                                stepSize: 1,
                                font: { size: 11 }
                            }
                        },
                        y: {
                            grid: { display: false },
                            ticks: {
                                font: { size: 10 }
                            }
                        }
                    }
                }
            });

            document.getElementById('chartsWrapper').style.display = 'grid';
            document.getElementById('chartsWrapper2').style.display = 'grid';
        }

        async function loadData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';

            try {
                // Sử dụng proxy ổn định
                const statsUrl = USE_PROXY ? BEST_PROXY + encodeURIComponent(API_URL) : API_URL;
                const summaryUrl = USE_PROXY ? BEST_PROXY + encodeURIComponent(API_SUMMARY_URL) : API_SUMMARY_URL;
                
                console.log(`📡 Đang tải dữ liệu từ API...`);
                
                // Gọi cả 2 API đồng thời
                const [statsResponse, summaryResponse] = await Promise.all([
                    fetch(statsUrl, {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' },
                        mode: 'cors',
                    }),
                    fetch(summaryUrl, {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' },
                        mode: 'cors',
                    })
                ]);
                
                if (!statsResponse.ok || !summaryResponse.ok) {
                    throw new Error(`API Error: ${statsResponse.status} / ${summaryResponse.status}`);
                }
                
                const statsData = await statsResponse.json();
                const summaryData = await summaryResponse.json();

                console.log(`✅ Tải dữ liệu thành công!`);

                renderStats(statsData, summaryData);
                renderCameras(statsData);
                renderChart(statsData);

                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                console.error(`❌ Lỗi:`, error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').innerHTML = `
                    <div class="error">
                        <strong>❌ Không thể kết nối API</strong>
                        <br><br>
                        <div style="background: #fff3cd; color: #856404; padding: 15px; border-radius: 8px; border-left: 4px solid #ffc107;">
                            <strong>⚠️ Nguyên nhân:</strong> ${error.message}
                            <br><br>
                            <strong>💡 Đang sử dụng CORS Proxy để bypass lỗi.</strong>
                            <br>Nếu vẫn lỗi, vui lòng:
                            <ul style="margin: 10px 0 0 20px;">
                                <li>Kiểm tra kết nối internet</li>
                                <li>Thử refresh lại trang (F5)</li>
                                <li>Kiểm tra API server có đang chạy không</li>
                            </ul>
                        </div>
